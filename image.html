<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Display</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1e1e24 0%, #2b2b36 100%);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        .image-container {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 80%;
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        
        .image-container:hover {
            transform: translateY(-5px);
        }
        img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 12px;
            display: block;
            margin: 0 auto;
        }
        h2 {
            margin-top: 20px;
            margin-bottom: 5px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        p {
            color: #a0a0ab;
            font-size: 0.9em;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img src="sample_image.png" alt="A beautiful landscape with mountains and a sunset in a flat vector style">
        <h2>Beautiful Landscape</h2>
        <p>A serene sunset over the mountains</p>
    </div>
</body>
</html>
